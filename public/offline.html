<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        background: #ffffff;
      }
      .splash {
        text-align: center;
      }
      h1 {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
      }
      p {
        color: #666;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="splash" data-testid="splash-screen">
      <h1>Habit Tracker</h1>
      <p>You are offline. Please reconnect to continue.</p>
    </div>
  </body>
</html>
